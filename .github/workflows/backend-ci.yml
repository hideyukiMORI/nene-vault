name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      # NENE2 is a Composer path repository (../NENE2, @dev) — see composer.json.
      # Clone the framework next to this checkout so `composer install` can
      # resolve it (same pattern as nene-records).
      - name: Clone NENE2 (local path dependency)
        run: git clone --depth=1 https://github.com/hideyukiMORI/NENE2.git ../NENE2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: cp .env.example .env

      - name: Create var directory
        run: mkdir -p var

      # composer check = test (PHPUnit, SQLite) + analyse (PHPStan) + cs
      # (php-cs-fixer dry-run) + locales + openapi + mcp + conformance (#112).
      # The PHPUnit suite is hermetic — phpunit.xml.dist forces every env var
      # (force="true", #18) — so runner-level env pollution cannot break it.
      - name: Run checks
        run: composer check
